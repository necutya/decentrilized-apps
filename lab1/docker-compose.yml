services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - db_data:/data
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":50051"
      DB_PATH: "/data/tickets.db"
      JWT_SECRET: "change-me-in-production"
    restart: unless-stopped

volumes:
  db_data:
