syntax = "proto3";
package registrypb;
option go_package = "github.com/necutya/decentrilized_apps/lab3/registry/gen/registrypb";

message NodeInfo {
  string id         = 1;
  string address    = 2;
  string public_key = 3;
}

message RegisterRequest  { NodeInfo node = 1; }
message RegisterResponse { bool ok = 1; }
message ListNodesRequest {}
message ListNodesResponse { repeated NodeInfo nodes = 1; }

service RegistryService {
  rpc Register  (RegisterRequest)  returns (RegisterResponse);
  rpc ListNodes (ListNodesRequest) returns (ListNodesResponse);
}
